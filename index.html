<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lecteur QR">
<title>Lecteur QR &amp; codes-barres</title>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #111;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
  }
  #app { display: flex; flex-direction: column; height: 100%; }
  header {
    padding: max(env(safe-area-inset-top), 12px) 16px 12px;
    text-align: center;
    font-size: 17px;
    font-weight: 600;
  }
  #version {
    display: block;
    font-size: 11px;
    font-weight: 400;
    color: #8e8e93;
    margin-top: 2px;
  }
  #videoContainer {
    position: relative;
    flex: 1;
    min-height: 0;
    background: #000;
  }
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #viseur {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 80%;
    height: 45%;
    border: 2px solid rgba(255, 255, 255, 0.7);
    border-radius: 16px;
    pointer-events: none;
  }
  #resultat {
    padding: 16px 16px max(env(safe-area-inset-bottom), 16px);
    background: #1c1c1e;
    display: none;
    flex-direction: column;
    gap: 12px;
  }
  #resultat.visible { display: flex; }
  #typeLabel { font-size: 13px; color: #8e8e93; }
  #contenu {
    background: #2c2c2e;
    border-radius: 10px;
    padding: 12px;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 15px;
    word-break: break-all;
    white-space: pre-wrap;
    max-height: 30vh;
    overflow-y: auto;
    -webkit-user-select: text;
    user-select: text;
  }
  .boutons { display: flex; gap: 10px; }
  button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    background: #3a3a3c;
    color: #fff;
  }
  button:active { opacity: 0.7; }
  #btnCopier { background: #0a84ff; }
  #erreur {
    padding: 24px;
    text-align: center;
    color: #ff453a;
    display: none;
  }
</style>
</head>
<body>
<div id="app">
  <header>Lecteur QR &amp; codes-barres<span id="version">v1.3 — 17/07/2026</span></header>
  <div id="videoContainer">
    <video id="video" playsinline muted></video>
    <div id="viseur"></div>
  </div>
  <div id="erreur"></div>
  <div id="resultat">
    <span id="typeLabel"></span>
    <div id="contenu"></div>
    <div class="boutons">
      <button id="btnCopier">Copier</button>
      <button id="btnReprendre">Scanner à nouveau</button>
    </div>
  </div>
</div>

<script>
const video = document.getElementById('video');
const resultat = document.getElementById('resultat');
const typeLabel = document.getElementById('typeLabel');
const contenu = document.getElementById('contenu');
const erreur = document.getElementById('erreur');
const btnCopier = document.getElementById('btnCopier');
const btnReprendre = document.getElementById('btnReprendre');

const NOMS_FORMATS = {
  QR_CODE: 'QR code',
  CODE_39: 'Code-barres Code 39',
  CODE_128: 'Code-barres Code 128'
};

const hints = new Map();
hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
  ZXing.BarcodeFormat.QR_CODE,
  ZXing.BarcodeFormat.CODE_39,
  ZXing.BarcodeFormat.CODE_128
]);
hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

const lecteur = new ZXing.MultiFormatReader();
lecteur.setHints(hints);

const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });

let scanning = false;
let derniereTentative = 0;

function decoderCanvas() {
  const source = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
  const bitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(source));
  return lecteur.decode(bitmap); // lève une exception si rien n'est trouvé
}

async function demarrerCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: 'environment',
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    scanning = true;
    requestAnimationFrame(boucleScan);
  } catch (e) {
    erreur.textContent = "Impossible d'accéder à la caméra. Vérifiez que la page est en HTTPS et que l'accès caméra est autorisé dans Réglages > Apps > Safari > Caméra.";
    erreur.style.display = 'block';
  }
}

function boucleScan(ts) {
  if (!scanning) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA && ts - derniereTentative > 200) {
    derniereTentative = ts;
    const W = video.videoWidth, H = video.videoHeight;
    let res = null;

    // Passe 1 : image complète
    canvas.width = W;
    canvas.height = H;
    ctx.drawImage(video, 0, 0, W, H);
    try { res = decoderCanvas(); } catch (e) {}

    // Passe 2 : zone centrale (viseur) agrandie x2, pour les petits codes
    if (!res) {
      const sw = Math.round(W * 0.8), sh = Math.round(H * 0.45);
      const sx = Math.round((W - sw) / 2), sy = Math.round((H - sh) / 2);
      canvas.width = sw * 2;
      canvas.height = sh * 2;
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw * 2, sh * 2);
      try { res = decoderCanvas(); } catch (e) {}
    }

    if (res) {
      scanning = false;
      afficherResultat(res.getText(), res.getBarcodeFormat());
      return;
    }
  }
  requestAnimationFrame(boucleScan);
}

function afficherResultat(texte, format) {
  const nomFormat = NOMS_FORMATS[ZXing.BarcodeFormat[format]] || 'Code détecté';
  typeLabel.textContent = nomFormat + ' — contenu :';
  // Affichage en texte brut uniquement — aucun lien cliquable, aucune action
  contenu.textContent = texte;
  resultat.classList.add('visible');
  if (navigator.vibrate) navigator.vibrate(100);
}

btnCopier.addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(contenu.textContent);
    btnCopier.textContent = 'Copié ✓';
    setTimeout(() => { btnCopier.textContent = 'Copier'; }, 1500);
  } catch (e) {
    btnCopier.textContent = 'Échec copie';
    setTimeout(() => { btnCopier.textContent = 'Copier'; }, 1500);
  }
});

btnReprendre.addEventListener('click', () => {
  resultat.classList.remove('visible');
  scanning = true;
  derniereTentative = 0;
  requestAnimationFrame(boucleScan);
});

demarrerCamera();
</script>
</body>
</html>
