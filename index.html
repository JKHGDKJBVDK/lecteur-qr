<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lecteur QR">
<title>Lecteur QR</title>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #111;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
  }
  #app { display: flex; flex-direction: column; height: 100%; }
  header {
    padding: max(env(safe-area-inset-top), 12px) 16px 12px;
    text-align: center;
    font-size: 17px;
    font-weight: 600;
  }
  #videoContainer {
    position: relative;
    flex: 1;
    min-height: 0;
    background: #000;
  }
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #viseur {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 60%;
    aspect-ratio: 1;
    border: 2px solid rgba(255, 255, 255, 0.7);
    border-radius: 16px;
    pointer-events: none;
  }
  #resultat {
    padding: 16px 16px max(env(safe-area-inset-bottom), 16px);
    background: #1c1c1e;
    display: none;
    flex-direction: column;
    gap: 12px;
  }
  #resultat.visible { display: flex; }
  #typeLabel { font-size: 13px; color: #8e8e93; }
  #contenu {
    background: #2c2c2e;
    border-radius: 10px;
    padding: 12px;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 15px;
    word-break: break-all;
    white-space: pre-wrap;
    max-height: 30vh;
    overflow-y: auto;
    -webkit-user-select: text;
    user-select: text;
  }
  .boutons { display: flex; gap: 10px; }
  button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    background: #3a3a3c;
    color: #fff;
  }
  button:active { opacity: 0.7; }
  #btnCopier { background: #0a84ff; }
  #erreur {
    padding: 24px;
    text-align: center;
    color: #ff453a;
    display: none;
  }
</style>
</head>
<body>
<div id="app">
  <header>Lecteur QR</header>
  <div id="videoContainer">
    <video id="video" playsinline muted></video>
    <div id="viseur"></div>
  </div>
  <div id="erreur"></div>
  <div id="resultat">
    <span id="typeLabel">Contenu du QR code :</span>
    <div id="contenu"></div>
    <div class="boutons">
      <button id="btnCopier">Copier</button>
      <button id="btnReprendre">Scanner à nouveau</button>
    </div>
  </div>
</div>

<canvas id="canvas" hidden></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const resultat = document.getElementById('resultat');
const contenu = document.getElementById('contenu');
const erreur = document.getElementById('erreur');
const btnCopier = document.getElementById('btnCopier');
const btnReprendre = document.getElementById('btnReprendre');

let scanning = false;
let stream = null;

async function demarrerCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    scanning = true;
    requestAnimationFrame(boucleScan);
  } catch (e) {
    erreur.textContent = "Impossible d'accéder à la caméra. Vérifiez que la page est en HTTPS et que l'accès caméra est autorisé dans Réglages > Safari.";
    erreur.style.display = 'block';
  }
}

function boucleScan() {
  if (!scanning) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height, {
      inversionAttempts: 'dontInvert'
    });
    if (code && code.data) {
      afficherResultat(code.data);
      return;
    }
  }
  requestAnimationFrame(boucleScan);
}

function afficherResultat(texte) {
  scanning = false;
  // Affichage en texte brut uniquement — aucun lien cliquable, aucune action
  contenu.textContent = texte;
  resultat.classList.add('visible');
  if (navigator.vibrate) navigator.vibrate(100);
}

btnCopier.addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(contenu.textContent);
    btnCopier.textContent = 'Copié ✓';
    setTimeout(() => { btnCopier.textContent = 'Copier'; }, 1500);
  } catch (e) {
    btnCopier.textContent = 'Échec copie';
    setTimeout(() => { btnCopier.textContent = 'Copier'; }, 1500);
  }
});

btnReprendre.addEventListener('click', () => {
  resultat.classList.remove('visible');
  scanning = true;
  requestAnimationFrame(boucleScan);
});

demarrerCamera();
</script>
</body>
</html>
